name: Google Trends Download & Process

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Download mode'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - crisis
          - all

jobs:
  run:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy scikit-learn pytrends tqdm matplotlib seaborn
      
      - run: |
          mkdir -p config data/raw_trends data/processed logs
      
      - run: |
          cat > config/__init__.py << 'EOF'
          EOF
          
          cat > config/countries_config.py << 'EOF'
          GEO_CODES = {
              "Argentina": "AR", "Turkey": "TR", "Russia": "RU", "Brazil": "BR",
              "South Africa": "ZA", "India": "IN", "Indonesia": "ID", "Kazakhstan": "KZ",
              "Ukraine": "UA", "Egypt": "EG", "Hungary": "HU", "Mexico": "MX",
              "Colombia": "CO", "United Kingdom": "GB", "Chile": "CL", "Switzerland": "CH",
              "Japan": "JP", "Singapore": "SG", "South Korea": "KR", "Sweden": "SE",
              "Canada": "CA", "Australia": "AU", "New Zealand": "NZ", "Norway": "NO",
              "Peru": "PE", "Poland": "PL", "Czech Republic": "CZ", "Thailand": "TH",
              "Malaysia": "MY", "Uruguay": "UY"
          }
          EOF
          
          cat > config/keywords_config.py << 'EOF'
          KEYWORDS = [
              "currency crisis", "capital flight", "exchange rate collapse",
              "currency devaluation", "financial panic", "currency crash",
              "economic crisis", "currency depreciation"
          ]
          EOF
      
      - run: |
          cat > download_trends.py << 'EOF'
          import os, sys, time, logging
          from pathlib import Path
          from datetime import datetime
          import pandas as pd
          from pytrends.request import TrendReq
          from tqdm import tqdm
          
          sys.path.insert(0, 'config')
          from countries_config import GEO_CODES
          from keywords_config import KEYWORDS
          
          logging.basicConfig(level=logging.INFO, format='%(message)s')
          logger = logging.getLogger(__name__)
          
          mode = sys.argv[1] if len(sys.argv) > 1 else 'test'
          
          if mode == 'test':
              countries_list = ['Argentina']
          elif mode == 'crisis':
              countries_list = list(GEO_CODES.keys())[:15]
          else:
              countries_list = list(GEO_CODES.keys())
          
          pytrend = TrendReq(hl="en-US", tz=0, retries=5, backoff_factor=0.5, timeout=(10, 35))
          all_data = []
          
          for country in tqdm(countries_list, desc="Countries"):
              geo = GEO_CODES[country]
              country_data = []
              logger.info(f"\n{'='*60}")
              logger.info(f"Downloading: {country}")
              logger.info(f"{'='*60}")
              
              for year in range(2010, 2026):
                  timeframe = f"{year}-01-01 {year}-12-31"
                  for attempt in range(3):
                      try:
                          pytrend.build_payload(kw_list=KEYWORDS, geo=geo, timeframe=timeframe)
                          df = pytrend.interest_over_time()
                          
                          if df.empty:
                              logger.info(f"  {year}: empty")
                              break
                          
                          if "isPartial" in df.columns:
                              df = df.drop(columns=["isPartial"])
                          
                          df['day'] = df.index.day
                          df['year_month'] = df.index.to_period('M')
                          week4_mask = (df['day'] >= 22) & (df['day'] <= 28)
                          df_week4 = df[week4_mask]
                          
                          if df_week4.empty:
                              logger.info(f"  {year}: no week4 data")
                              break
                          
                          df_week4 = df_week4.drop_duplicates(subset=['year_month'], keep='first')
                          df_week4 = df_week4.drop(columns=['day', 'year_month'])
                          df_week4 = df_week4.reset_index()
                          df_week4.rename(columns={"date": "Time_ID"}, inplace=True)
                          df_week4["Country_ID"] = country
                          
                          keyword_cols = [c for c in df_week4.columns if c in KEYWORDS]
                          df_week4 = df_week4[["Country_ID", "Time_ID"] + keyword_cols]
                          country_data.append(df_week4)
                          
                          logger.info(f"  {year}: ✓ ({len(df_week4)} records)")
                          time.sleep(2)
                          break
                      
                      except Exception as e:
                          logger.info(f"  {year}: retry {attempt+1}/3")
                          time.sleep(10)
              
              if country_data:
                  country_df = pd.concat(country_data, ignore_index=True)
                  all_data.append(country_df)
          
          if all_data:
              final_df = pd.concat(all_data, ignore_index=True)
              final_df["Time_ID"] = pd.to_datetime(final_df["Time_ID"]).dt.strftime("%Y-%m-%d")
              final_df = final_df.sort_values(["Country_ID", "Time_ID"]).reset_index(drop=True)
              
              output_path = Path('data/raw_trends') / f'google_trends_{datetime.now().strftime("%Y%m%d_%H%M%S")}.csv'
              final_df.to_csv(output_path, index=False)
              
              logger.info(f"\n{'='*60}")
              logger.info(f"✓ Download Complete!")
              logger.info(f"  File: {output_path.name}")
              logger.info(f"  Records: {len(final_df)}")
              logger.info(f"  Countries: {final_df['Country_ID'].nunique()}")
              logger.info(f"{'='*60}\n")
          EOF
          
          python download_trends.py ${{ github.event.inputs.mode }}
      
      - run: |
          cat > process_data.py << 'EOF'
          import sys, logging
          from pathlib import Path
          from datetime import datetime
          import pandas as pd
          import numpy as np
          from sklearn.decomposition import PCA
          
          sys.path.insert(0, 'config')
          from keywords_config import KEYWORDS
          
          logging.basicConfig(level=logging.INFO, format='%(message)s')
          logger = logging.getLogger(__name__)
          
          raw_dir = Path('data/raw_trends')
          csv_files = sorted(raw_dir.glob('*.csv'))
          
          if not csv_files:
              logger.error("No CSV files found!")
              sys.exit(1)
          
          df = pd.read_csv(csv_files[-1])
          logger.info(f"Loaded: {csv_files[-1].name} ({len(df)} records)")
          
          keyword_cols = [c for c in df.columns if c in KEYWORDS]
          X = df[keyword_cols].values
          X = np.nan_to_num(X, 0)
          
          logger.info("Performing PCA...")
          pca = PCA(n_components=1)
          pc1 = pca.fit_transform(X).flatten()
          logger.info(f"  PC1 explained variance: {pca.explained_variance_ratio_[0]:.2%}")
          
          df['PC1_panic_index'] = pc1
          df['V_velocity'] = df.groupby('Country_ID')['PC1_panic_index'].diff().fillna(0)
          
          logger.info("Applying 1% Winsorization...")
          for col in ['PC1_panic_index', 'V_velocity']:
              lower = df[col].quantile(0.01)
              upper = df[col].quantile(0.99)
              df[col] = df[col].clip(lower=lower, upper=upper)
          
          logger.info("Creating lagged variables...")
          df['S_sentiment_lag1'] = df.groupby('Country_ID')['PC1_panic_index'].shift(1)
          df['V_velocity_lag1'] = df.groupby('Country_ID')['V_velocity'].shift(1)
          df['S_V_interaction'] = df['S_sentiment_lag1'] * df['V_velocity_lag1']
          
          output_file = Path('data/processed') / f'master_dataset_{datetime.now().strftime("%Y%m%d_%H%M%S")}.csv'
          export_cols = ['Time_ID', 'Country_ID', 'PC1_panic_index', 'V_velocity', 
                        'S_sentiment_lag1', 'V_velocity_lag1', 'S_V_interaction'] + keyword_cols
          df[export_cols].to_csv(output_file, index=False)
          
          logger.info(f"\n{'='*60}")
          logger.info(f"✓ Processing Complete!")
          logger.info(f"  Output: {output_file.name}")
          logger.info(f"  Records: {len(df)}")
          logger.info(f"  Countries: {df['Country_ID'].nunique()}")
          logger.info(f"{'='*60}\n")
          
          summary_file = Path('data/processed') / 'summary_statistics.csv'
          summary = df.groupby('Country_ID')[['PC1_panic_index', 'V_velocity']].describe()
          summary.to_csv(summary_file)
          logger.info(f"Summary saved: {summary_file.name}")
          EOF
          
          python process_data.py
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: google-trends-results
          path: data/
          retention-days: 30
      
      - run: |
          echo "## ✓ Google Trends Data Collection Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode**: ${{ github.event.inputs.mode }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: Success ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Results" >> $GITHUB_STEP_SUMMARY
          echo "Download the Artifacts section above to get:" >> $GITHUB_STEP_SUMMARY
          echo "- **raw_trends/**: Original Google Trends data" >> $GITHUB_STEP_SUMMARY
          echo "- **processed/**: Processed datasets with PCA, velocity, and interaction terms" >> $GITHUB_STEP_SUMMARY
